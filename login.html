<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Starbucks</title>
<link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-container">

<div class="login-box">

<h2>Starbucks</h2>
<p>Inicia sesión o crea una cuenta</p>

<div class="tabs">
<button onclick="mostrarLogin()">Iniciar Sesión</button>
<button onclick="mostrarRegistro()">Registrarse</button>
</div>

<form id="formLogin" class="form">
<input type="email" placeholder="Correo electrónico" required>
<input type="password" placeholder="Contraseña" required>

<div class="captcha-box">
<span id="captchaTexto"></span>
<input type="text" id="captchaInput" placeholder="Escribe el captcha" required>
</div>

<button type="submit" class="btn-login">Entrar</button>
</form>

<form id="formRegistro" class="form oculto">
<input type="text" placeholder="Nombre completo" required>
<input type="email" placeholder="Correo electrónico" required>
<input type="password" placeholder="Contraseña" required>
<button type="submit" class="btn-login">Crear Cuenta</button>
</form>

</div>
</div>

<script src="login.js"></script>
</body>
</html>
